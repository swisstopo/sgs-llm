name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build

  mock-agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mock-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: node --check server.mjs
      - name: Smoke-start the server
        run: |
          npm start &
          sleep 2
          curl -sf http://localhost:8787/data/sample-places.geojson > /dev/null

  # Deploys the frontend to the POC (S3 + CloudFront) after CI passes on main.
  # Credentials come from a GitHub OIDC role in the swisstopo POC account —
  # no long-lived keys; the role only allows the bucket sync and the
  # CloudFront invalidation (see docs/deployment.md).
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend, mock-agent]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::259789526488:role/github-actions-sgs-llm-deploy
          aws-region: eu-central-1
      - name: Deploy frontend
        run: PROFILE= ./scripts/deploy-frontend.sh
